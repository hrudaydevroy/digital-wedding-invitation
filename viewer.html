<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Wedding Gallery</title>

    <link rel="stylesheet" href="viewer.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="gallery-header">
      <h1>Wedding Gallery</h1>

      <div class="tabs">
        <button id="photosBtn" class="active">Photos</button>
        <button id="videosBtn">Videos</button>
      </div>
    </header>

    <section id="mediaContainer" class="gallery"></section>

    <!-- FULLSCREEN VIEWER -->

    <div id="viewer" class="viewer">
      <button class="closeBtn" id="closeViewer">✕</button>

      <button class="navBtn left" id="prevBtn">❮</button>

      <div class="viewer-content" id="viewerContent"></div>

      <button class="navBtn right" id="nextBtn">❯</button>

      <a id="downloadBtn" class="downloadBtn">Download</a>
    </div>

    <script src="viewer.js"></script>
  </body>
</html>
