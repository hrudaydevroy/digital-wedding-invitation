<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Wedding Admin Dashboard</title>

    <link rel="stylesheet" href="admin-dashboard.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard">
      <h2>Wedding Media Manager</h2>

      <div class="tabs">
        <button id="imagesTab" class="active">Images</button>
        <button id="videosTab">Videos</button>
        <button id="rsvpTab">RSVPs</button>
      </div>

      <!-- IMAGES -->

      <div id="imagesSection" class="section active">
        <div class="upload">
          <h3>Upload Images</h3>

          <form id="imageForm">
            <input type="file" name="file" accept="image/*" multiple required />

            <button type="submit">Upload Images</button>
          </form>
        </div>

        <div class="gallery">
          <h3>Uploaded Images</h3>

          <div id="imageList"></div>
        </div>
      </div>

      <!-- VIDEOS -->

      <div id="videosSection" class="section">
        <div class="upload">
          <h3>Upload Videos</h3>

          <form id="videoForm">
            <input type="file" name="file" accept="video/*" multiple required />

            <button type="submit">Upload Videos</button>
          </form>
        </div>

        <div class="gallery">
          <h3>Uploaded Videos</h3>

          <div id="videoList"></div>
        </div>
      </div>

      <!-- RSVP -->

      <div id="rsvpSection" class="section">
        <h3>RSVP Submissions</h3>

        <table id="rsvpTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Guests</th>
              <th>Message</th>
              <th>Time</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>
    </div>

    <script src="admin-dashboard.js"></script>
  </body>
</html>
