# ===============================
# MongoDB Configuration
# ===============================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/wedding}
spring.data.mongodb.database=wedding


# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB


# ===============================
# File Storage Location
# ===============================
file.upload-dir=uploads


# ===============================
# JWT Security (optional future use)
# ===============================
jwt.secret=change-me
jwt.expiration=3600000


# ===============================
# Cloudinary (optional for cloud storage)
# ===============================
cloudinary.cloud_name=your_cloud_name
cloudinary.api_key=your_api_key
cloudinary.api_secret=your_api_secret


# ===============================
# Twilio SMS (optional RSVP alerts)
# ===============================
twilio.accountSid=
twilio.authToken=
twilio.fromNumber=